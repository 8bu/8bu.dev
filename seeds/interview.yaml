  - input: "what have you shipped at WegoPro"
    response: "Recent bookings, policy change indicators, hierarchy approvals, custom fields, the onboarding flow, and the entire back-office dashboard - plus Stripe billing and the transactional email + i18n pipeline. Four years of B2B travel and expense at scale, with self-managed AWS serverless deployments."
    topic: portfolio/artifact/wegopro
  - input: "what's the back office dashboard"
    response: "The internal operators' surface at WegoPro - I shipped the entire back-office dashboard and solo-migrated it to Nuxt 4 + Nuxt UI."
    topic: portfolio/artifact/wegopro
  - input: "did you build the onboarding flow"
    response: "Yes - the onboarding flow was one of the features I led shipping at WegoPro, alongside recent bookings, policy indicators, hierarchy approvals, and custom fields."
    topic: portfolio/artifact/wegopro
  - input: "tell me about the WegoPro migration"
    response: "I led the Nuxt 2 to Nuxt 4 migration using Vue 3 web components as a bridge layer, and solo-migrated the back-office dashboard to Nuxt 4 + Nuxt UI - all on a live B2B platform without halting feature work."
    topic: portfolio/artifact/nuxt-migration
  - input: "what's the work you're proudest of"
    response: "The WegoPro migration - pulling off Nuxt 2 to Nuxt 4 on a live B2B platform without stopping feature delivery. The framework upgrade was a weekend; carrying four years of accreted decisions was the year-long part."
    topic: portfolio/artifact/nuxt-migration
  - input: "what was the bridge layer"
    response: "Vue 3 web components. New features authored in Vue 3, compiled as custom elements via defineCustomElement, embedded inside the still-running Nuxt 2 host. The host owns layout, nav, and auth; the island owns its state and DOM. No big-bang rewrite."
    topic: portfolio/artifact/vue3-web-components-bridge
  - input: "how did the bridge handle reactive props"
    response: "Treat it like a network boundary. Attributes are strings, so anything richer is JSON-encoded by the host and parsed by the island, or assigned via a template ref. Outbound goes the other way - the island dispatches CustomEvents the host listens for."
    topic: portfolio/artifact/vue3-web-components-bridge
  - input: "when does the web components bridge fail"
    response: "When UI crosses the boundary every render - drag-and-drop spanning host and island, forms whose validation lives outside the island. If you can't draw a clean line around the island by data ownership, the bridge costs more than the cleanup it defers."
    topic: portfolio/artifact/vue3-web-components-bridge
  - input: "what is the modular monolith"
    response: "The web architecture I designed at WegoPro and the team adopted - one codebase with clear module boundaries, so surfaces could migrate along their natural seams instead of a big-bang rewrite."
    topic: portfolio/artifact/wegopro
  - input: "did you migrate the back office alone"
    response: "Yes - I solo-migrated the back-office dashboard to Nuxt 4 + Nuxt UI. It had a cleaner boundary than the main app, so it moved separately."
    topic: portfolio/artifact/nuxt-migration
  - input: "how do you migrate without stopping features"
    response: "Make it additive. The bridge let people ship in Vue 3 or stay in Vue 2 per surface, so the roadmap never paused - every PR still shipped a feature or fix while the stack modernized underneath."
    topic: portfolio/artifact/nuxt-migration
  - input: "what stack does WegoPro use"
    response: "Nuxt 2 on Vue 2.7 originally - JavaScript, Nuxt-i18n, Buefy, Vuetify, Tailwind, Stylus/SCSS, Jest, Cypress, Serverless on AWS, Stripe. The migration moved it toward Nuxt 4."
    topic: portfolio/artifact/wegopro
  - input: "what testing did you use at WegoPro"
    response: "Jest and Cypress, with ESLint. Pragmatic coverage - I test what's worth protecting."
    topic: portfolio/artifact/wegopro
  - input: "how did WegoPro handle i18n"
    response: "Nuxt-i18n with Phrase for translation management. In the migration, i18n was one of the slowdowns - strings lived in one big shared tree and didn't move per-component."
    topic: portfolio/artifact/nuxt-migration
  - input: "what was WegoPro called before"
    response: "Travelstop. Same B2B corporate travel and expense product."
    topic: portfolio/artifact/wegopro
  - input: "how big was the WegoPro codebase"
    response: "Around 150k lines of TypeScript on Nuxt 2 / Vue 2.7 - two surfaces in a monorepo: a customer-facing app with heavy SSR and SEO, and an internal back-office dashboard."
    topic: portfolio/artifact/nuxt-migration
  - input: "did you mentor at WegoPro"
    response: "Yes - I mentored teammates on Vue 3 patterns, led the code review process, and owned best practices for the web team."
    topic: portfolio/artifact/wegopro
  - input: "did you work with design and PM"
    response: "Closely - I turned specs from design and PM into shipped features, and handled production issues and quick fixes when things broke. Tools were Figma, Zeplin, and Phrase."
    topic: portfolio/artifact/wegopro
  - input: "what was hardest about the Nuxt migration"
    response: "Not Vue 3 - the four years of accreted decisions. i18n strings in one shared tree, SCSS tokens that didn't cross shadow DOM, Vuex stores with action-sequencing assumptions. The bridge was the easy part."
    topic: portfolio/artifact/nuxt-migration
  - input: "what would you do differently in the migration"
    response: "Budget a delete week upfront with named owners per legacy module - the bridge made living in the in-between cheap, so it stretched. And migrate the back-office first; its cleaner boundary would have taught us the patterns before the harder codebase."
    topic: portfolio/artifact/nuxt-migration
  - input: "did you own frontend direction"
    response: "Yes - I owned technical direction and best practices for WegoPro's web platform, held the architectural line through the whole migration, and made the call on the island/host boundary."
    topic: portfolio/artifact/wegopro
  - input: "is WegoPro remote"
    response: "Yes - fully remote, the whole four years. I'm on GMT+7 and deliver async-first."
    topic: portfolio/artifact/wegopro

