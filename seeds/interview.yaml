cosimi_ai:
  - input: "do you have any AI experience"
    response: "Yes - Cosimi, the system running this chat. I built a GraphRAG pipeline: my source docs are chunked into a graph, Claude generates and audits Q&A pairs offline, and the survivors are embedded into Postgres with pgvector. At request time there's no LLM - the question is embedded, vector-searched, and the graph is walked for context. I own the source, the audit gate, and the retrieval."
    topic: portfolio/artifact/cosimi
  - input: "have you worked with RAG or vector databases"
    response: "Cosimi is retrieval-augmented over pgvector - bge-m3 embeddings in Postgres, an HNSW index, plus a chunk-relation graph I walk for context. The retrieval is deterministic and LLM-free; the model only runs at build time to generate and audit the corpus."
    topic: portfolio/artifact/cosimi-principle
  - input: "what is GraphRAG"
    response: "Retrieval that combines vector search with a graph. In Cosimi, documents are chunked and linked into a graph; a query embeds, seeds from the nearest chunks and pairs by cosine, then walks the graph for surrounding context before ranking. Vector recall plus graph structure."
    topic: portfolio/artifact/cosimi
  - input: "is this chat an LLM"
    response: "No live LLM. The only model runs offline when I ingest the corpus - it never sees your question. Live, your question is embedded and matched by vector search over a graph I built; nothing is generated in real time."
    topic: portfolio/artifact/cosimi-principle
  - input: "is Cosimi just a wrapper around ChatGPT"
    response: "No. There's no hosted chat model in the loop at request time. The only model use is offline, building the corpus with Claude. Live, it's vector search over Postgres - my own engine, not a wrapper."
    topic: portfolio/artifact/cosimi-principle
  - input: "why is there no LLM in the chat"
    response: "A model in the request path fails confidently, in my voice - and you can't see the seam between what I believe and a fluent guess. So I fence generation to build time: Claude writes and audits the pairs offline, behind a gate I read, then it freezes. Live, it's just vector search."
    topic: portfolio/artifact/cosimi-principle
  - input: "can this chat hallucinate"
    response: "No live model means no live hallucination. Answers are grounded on source I wrote, generated and audited offline, then frozen. If there's no grounded answer, it tells you - it doesn't improvise."
    topic: portfolio/artifact/cosimi-principle
  - input: "what happens if it doesn't know the answer"
    response: "It says it doesn't, rather than improvise. The system either has an answer built from my source or it deflects - silence over a confident guess in my voice."
    topic: portfolio/artifact/cosimi-principle
  - input: "what did you build versus what the model built"
    response: "The model builds the corpus - chunks and pairs are model-generated, none hand-typed. What I own is the source it's grounded on, the audit gate, the retrieval engine, and the deterministic guard that screens the inputs I won't answer."
    topic: portfolio/artifact/cosimi-principle
  - input: "what's your AI stack"
    response: "Postgres with pgvector for embeddings (bge-m3, 1024-dim, HNSW), the Anthropic Claude SDK at build time to generate and audit pairs, and a TypeScript GraphRAG retriever on a Hono Cloudflare Worker. No model in the live path."
    topic: portfolio/artifact/cosimi
  - input: "what database does Cosimi use"
    response: "Postgres with the pgvector extension - embeddings in a vector column with an HNSW index, plus a chunk-relation graph. Queried by cosine similarity at request time."
    topic: portfolio/artifact/cosimi
  - input: "what embedding model do you use"
    response: "bge-m3, 1024-dimensional, stored in pgvector with an HNSW index. The same model embeds the corpus offline and the query at request time."
    topic: portfolio/artifact/cosimi
  - input: "where is Cosimi deployed"
    response: "A Cloudflare Worker at the edge - the public API is a Hono server with no LLM in its dependency graph. The build is a pnpm + Turbo monorepo."
    topic: portfolio/artifact/cosimi
  - input: "what language is Cosimi written in"
    response: "TypeScript throughout - the Hono edge API, the GraphRAG retriever over a postgres.js client, and the build-time ingest pipeline."
    topic: portfolio/artifact/cosimi
  - input: "are you a fullstack developer"
    response: "Yes. At BlockDevs I owned everything outside the smart contracts - Express backends, PostgreSQL, The Graph subgraphs - across two DeFi platforms. And Cosimi is fullstack end to end: schema and migrations, the build-time ingest pipeline, the edge API, and the UI. Fullstack plus AI is where I'm headed."
    topic: portfolio/artifact/cosimi
  - input: "can you do backend work"
    response: "Yes - since the BlockDevs years: Express APIs, auth/sessions, PostgreSQL schemas, and The Graph subgraphs behind two DeFi platforms. Plus Cosimi's backend end to end: Postgres + pgvector schema, the ingest pipeline, and a Hono API on a Cloudflare Worker."
    topic: portfolio/artifact/cosimi
  - input: "have you used Postgres or pgvector"
    response: "Yes - PostgreSQL goes back to the BlockDevs years: schemas and queries behind two DeFi backends. With pgvector it's also the retrieval substrate behind Cosimi - embeddings in a vector column with an HNSW index, plus a chunk-relation graph, queried by cosine similarity at request time."
    topic: portfolio/artifact/cosimi
  - input: "do you use the Claude or Anthropic API"
    response: "Yes - in Cosimi's build-time pipeline. One Claude model generates the Q&A pairs from my source, a second audits every pair, and only the survivors get embedded. The key never touches the live request path."
    topic: portfolio/artifact/cosimi
  - input: "what are the embeddings for"
    response: "They turn text into vectors so retrieval is semantic, not keyword. Chunks and pairs are embedded with bge-m3 into pgvector; your question is embedded the same way and matched by cosine similarity."
    topic: portfolio/artifact/cosimi
  - input: "how does the audit gate work"
    response: "After one model generates a Q&A pair from my source, a second model audits it before anything is embedded. Generation grounded on real source, checked by another model, frozen before it can reach anyone - that's a build artifact, not a hallucination risk."
    topic: portfolio/artifact/cosimi-principle
  - input: "how does this chat answer questions"
    response: "A deterministic guard screens anything out of scope first, then your question is embedded and matched against curated Q&A pairs; the long tail falls through to vector search over the chunk graph. No LLM in the request path - same question, same answer."
    topic: portfolio/artifact/cosimi
  - input: "what is Cosimi"
    response: "The GraphRAG engine powering this chat. No LLM in the request path - your question is embedded, vector-searched against Postgres/pgvector, and the graph is walked for context. The corpus is built offline by Claude, grounded on docs I wrote and gated by an audit."
    topic: portfolio/artifact/cosimi
  - input: "what's the Cosimi Principle"
    response: "Put the model where it can't lie to the user. Generation is an asset at build time - grounded, audited, frozen into an inspectable artifact. At request time, ungrounded and speaking as a person, the same generation is a liability. So I fence it to build time."
    topic: portfolio/artifact/cosimi-principle
  - input: "how does retrieval work without a model"
    response: "The query is embedded, a vector search seeds from the nearest chunks and pairs by cosine, the engine walks the chunk-relation graph for context, ranks, and returns. Deterministic - same question, same answer, every time, at zero per-reply token cost."
    topic: portfolio/artifact/cosimi
  - input: "why did you build Cosimi"
    response: "I wanted a portfolio chat that answers in my voice without a hosted LLM improvising as me. Fencing generation to build time made the failure mode honest: a grounded answer, or none - and it pushed me to actually have positions worth ingesting."
    topic: portfolio/artifact/cosimi-principle

working_style:
  - input: "how do you approach a new codebase"
    response: "I read before I touch. I map the seams - where state lives, where the boundaries already are - then make the smallest change that proves the path, and only then scale it out. Same instinct that makes live migrations work."
  - input: "what's your working style"
    response: "Product-minded and async-first. I work on the product, not the task - architecture, review, and feature work all serve the product, not the queue. Fully remote since 2017, on GMT+7."
  - input: "what does product-minded mean to you"
    response: "I'd rather make the product better than just close tickets. I treat the product as mine, not a queue - that lens drives how I do architecture, review, and features."
  - input: "how do you handle code review"
    response: "I lead it. I use review to hold the architectural line and raise the team's bar - I led the review process at WegoPro and ran reviews and knowledge-sharing at BlockDevs. I'd rather level up the team than work in isolation."
  - input: "are you a team player"
    response: "Yes - I raise the team's bar through code review and mentoring rather than working in isolation. I led onboarding at BlockDevs and mentored on Vue 3 patterns at WegoPro."
  - input: "do you prefer working solo or on a team"
    response: "Both have their place - I've solo-migrated a dashboard and led a team's technical direction. I default to lifting the team through review and mentoring, while owning the hard architectural calls myself."
  - input: "how do you mentor"
    response: "Through onboarding, pairing, and code review. I led onboarding and mentoring at BlockDevs and mentored teammates on Vue 3 patterns at WegoPro - raising the bar in-team rather than gatekeeping."
  - input: "how do you document your work"
    response: "A written record per migrated surface - a one-page doc of what moved, what stayed, and the known sharp edges. On the WegoPro migration that mattered more than any single technical decision."
