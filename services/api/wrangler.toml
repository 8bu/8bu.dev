name = "portf-api"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.portf]
name = "portf-api"
routes = [{ pattern = "8bu.dev/api/*", zone_name = "8bu.dev" }]

[[env.portf.hyperdrive]]
binding = "HYPERDRIVE"
id = "7994710a22e94e3fab65ac8deaa79a59"

# Workers-AI binding — the prod embedder (bge-m3) reads it via runWithAi.
[env.portf.ai]
binding = "AI"

# Rate-limiting binding (GA `[[ratelimits]]`, requires wrangler >=4.36 — this
# workspace pins wrangler 4). POST /chat is gated at 20 req / 60s per client.
# Carried request-scoped via runWithRateLimit (the binding is a non-string object
# — it reaches neither c.env nor process.env). `period` accepts only 10 or 60;
# `limit` MUST stay equal to RATE_LIMIT in src/lib/rate-limit.ts. `namespace_id`
# is an operator-chosen positive integer unique within the account (no
# provisioning step) — surfaced as env.CHAT_LIMIT.limit(). The in-memory fallback
# is per-isolate, NOT a prod safety net, so this binding is a HARD release gate.
[[env.portf.ratelimits]]
name = "CHAT_LIMIT"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[env.portf.vars]
LOG_LEVEL = "info"
EXPOSE_MATCH_INSIGHTS = "true"
SSE_DELAY_MODE = "token"
SSE_DELAY_BASE_MS = "30"
SSE_DELAY_JITTER_MS = "20"
# @cosimi runtime: prod embeds with Workers-AI (NOT the ollama default — an
# unset EMBEDDER would route prod to localhost:11434 and fail at embed time).
EMBEDDER = "workers-ai"
EMBEDDING_DIM = "1024"
WORKERS_AI_EMBED_MODEL = "@cf/baai/bge-m3"
RETRIEVE_TOP_K = "8"
RETRIEVE_SEED_K = "4"
RETRIEVE_MAX_HOPS = "2"
RETRIEVE_MIN_SIMILARITY = "0.45"
